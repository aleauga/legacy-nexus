<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><title>Exportes</title>
<link rel="stylesheet" href="/static/css/styles.css">
</head><body>
<header>
  <a href="/static/index.html">Inicio</a>
  <a href="/static/catalog.html">Catálogo</a>
  <a href="/static/inventory.html">Inventario</a>
  <a href="/static/cart.html">Carrito</a>
  <a href="/static/sales-history.html">Ventas</a>
  <a href="/static/purchases.html">Compras</a>
  <a href="/static/reports.html">Reportes</a>
  <a href="/static/notifications.html">Notificaciones</a>
  <a href="/static/refunds.html">Devoluciones</a>
  <a href="/static/exports.html">Exportes</a>
</header>
<div class="container">
  <h2>Exportes — Pivot</h2>
  <div class="row">
    <input id="eYear" type="number" value="2025">
    <select id="eDimA">
      <option value="customer_type">customer_type</option>
      <option value="status">status</option>
      <option value="user_id">user_id</option>
    </select>
    <select id="eDimB">
      <option value="category">category</option>
      <option value="supplier_id">supplier_id</option>
      <option value="warehouse_id">warehouse_id</option>
    </select>
    <button onclick="Exports.load()">Generar pivot</button>
  </div>
  <table id="pivotTable">
    <thead><tr>
      <th>dim_a</th><th>dim_b</th><th>ventas</th>
      <th>gross</th><th>effective</th><th>after_volume</th>
    </tr></thead>
    <tbody id="pivotBody"></tbody>
  </table>
  <div id="pivotMeta"></div>

  <h2>Totales</h2>
  <div class="row">
    <input id="tYear" type="number" value="2025">
    <input id="tCt" placeholder="customer_type (opcional)">
    <button onclick="Exports.totals()">Calcular</button>
  </div>
  <pre id="totalsOut"></pre>

  <div class="admin-only">
    <h2>Descargar CSV (admin)</h2>
    <div class="row">
      <input id="eFilter" placeholder="Filtro SQL (ej: id > 0)" style="flex:1">
      <button onclick="Exports.downloadCsv()">Descargar</button>
    </div>
    <pre id="csvOut"></pre>
  </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/session_manager.js"></script>
<script src="/static/js/exports.js"></script>
<script>SESSION.requireLogin(); Exports.init();</script>
</body></html>
