<!DOCTYPE html>
<html><head>
<meta charset="utf-8"><title>Legacy Nexus — Login</title>
<link rel="stylesheet" href="/static/css/styles.css">
</head><body>
<div class="container" style="max-width:400px; margin-top:80px;">
  <h2>Legacy Nexus</h2>
  <div class="row"><input id="u" placeholder="usuario"></div>
  <div class="row"><input id="p" type="password" placeholder="contraseña"></div>
  <div class="row"><button onclick="doLogin()">Entrar</button></div>
  <div id="msg" class="error"></div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/session_manager.js"></script>
<script>
function doLogin() {
  var u = document.getElementById('u').value;
  var p = document.getElementById('p').value;
  API.post('/api/login', {username: u, password: p}, function(err, data) {
    if (err) { document.getElementById('msg').innerText = 'Login fallido'; return; }
    SESSION.save(data);
    window.location.href = '/static/index.html';
  });
}
</script>
</body></html>
